<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>畑ノート | 農作業日報</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2F5233">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="畑ノート">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6EE;
  --surface:#FFFFFF;
  --ink:#1E2A1C;
  --ink-soft:#4B5A45;
  --primary:#2F5233;
  --primary-dark:#1F3A24;
  --accent:#D98E2B;
  --accent-soft:#F5E2C2;
  --soil:#7A5230;
  --soil-soft:#E9DCC9;
  --sky:#5F8A9A;
  --sky-soft:#E2EEF1;
  --danger:#B4462E;
  --danger-soft:#F6DFD8;
  --line:#DCD9CB;
  --radius:14px;
  --safe-bottom:env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Noto Sans JP', sans-serif;
  min-height:100vh;
  padding-bottom:calc(78px + var(--safe-bottom));
}
h1,h2,h3,.disp{font-family:'Zen Kaku Gothic New', sans-serif;}
button, select, input, textarea{font-family:inherit; font-size:16px;}
.num{font-family:'Roboto Mono', monospace;}

/* ---------- Setup screen ---------- */
#setupScreen{
  position:fixed; inset:0; background:var(--primary); z-index:100;
  display:flex; align-items:center; justify-content:center; padding:24px;
  overflow-y:auto;
}
#setupScreen.hidden{display:none;}
.setup-card{
  background:#fff; border-radius:18px; padding:26px 22px; max-width:420px; width:100%;
}
.setup-card .sp-icon{font-size:40px; text-align:center; margin-bottom:6px;}
.setup-card h1{font-size:19px; text-align:center; margin:0 0 6px; color:var(--primary-dark);}
.setup-card p.sp-desc{font-size:13px; color:var(--ink-soft); text-align:center; margin:0 0 20px; line-height:1.6;}
.setup-card .field{margin-bottom:14px;}
.setup-card .field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:700;}
.setup-card .field input{width:100%; padding:12px; border:1.5px solid var(--line); border-radius:10px; background:#FCFBF7;}
.setup-card .field .hint{font-size:11px; color:var(--ink-soft); margin-top:5px; line-height:1.5;}
.setup-status{font-size:12px; color:var(--ink-soft); text-align:center; margin-top:12px; min-height:16px;}
.google-status{
  display:flex; align-items:center; gap:8px; font-size:13px; color:var(--ink-soft);
  background:#F5F3EA; border-radius:8px; padding:10px 12px; margin-bottom:8px;
}
.google-status.signed-in{color:var(--primary-dark); font-weight:700;}
.google-status .gs-avatar{width:22px; height:22px; border-radius:50%;}

/* Header */
.topbar{
  background:var(--primary);
  color:#fff;
  padding:18px 18px 22px;
  position:relative;
  overflow:hidden;
}
.topbar::after{
  content:"";
  position:absolute; right:-30px; top:-30px;
  width:140px; height:140px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
}
.topbar-row{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; position:relative; z-index:1;}
.farm-name{font-size:13px; opacity:0.85; margin:0 0 2px;}
.today-date{font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:26px; margin:0; letter-spacing:0.02em;}
.today-sub{font-size:12px; opacity:0.8; margin:4px 0 0;}
.sync-badge{display:inline-flex; align-items:center; gap:4px; font-size:11px; opacity:0.85; margin-top:4px;}
.sync-dot{width:7px; height:7px; border-radius:50%; background:#8FBF6A;}
.sync-dot.offline{background:#D98E2B;}
.settings-btn{
  background:rgba(255,255,255,0.14); border:none; color:#fff;
  width:38px; height:38px; border-radius:10px; font-size:18px;
  display:flex; align-items:center; justify-content:center; cursor:pointer;
}
.settings-panel{
  margin-top:14px; background:rgba(255,255,255,0.1); border-radius:10px; padding:12px;
  display:none; position:relative; z-index:1;
}
.settings-panel.open{display:block;}
.settings-panel label{display:block; font-size:11px; opacity:0.85; margin-bottom:4px; margin-top:8px;}
.settings-panel label:first-child{margin-top:0;}
.settings-panel input{width:100%; padding:8px 10px; border-radius:8px; border:none; margin-bottom:2px;}
.settings-panel .row-btns{display:flex; gap:8px; margin-top:12px;}
.settings-panel button.save{background:var(--accent); color:var(--primary-dark); border:none; font-weight:700; padding:9px 14px; border-radius:8px; flex:1; cursor:pointer;}
.settings-panel button.reset{background:transparent; color:#fff; border:1px solid rgba(255,255,255,0.4); padding:9px 14px; border-radius:8px; cursor:pointer;}

main{padding:16px; max-width:640px; margin:0 auto;}
.tab{display:none;}
.tab.active{display:block;}

/* Cards */
.card{
  background:var(--surface);
  border-radius:var(--radius);
  padding:16px;
  margin-bottom:14px;
  border:1px solid var(--line);
}
.card h2{font-size:15px; margin:0 0 12px; color:var(--primary-dark); display:flex; align-items:center; gap:8px;}
.field{margin-bottom:12px;}
.field label{display:block; font-size:12px; color:var(--ink-soft); margin-bottom:5px; font-weight:500;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:10px;
  background:#FCFBF7; color:var(--ink);
}
.field textarea{resize:vertical; min-height:56px;}
.link-btn{
  background:none; border:none; color:var(--primary); font-size:12px; font-weight:700;
  padding:6px 0 0; cursor:pointer; text-decoration:underline;
}
.field-manager{
  display:none; margin-top:10px; background:#F5F3EA; border:1px solid var(--line);
  border-radius:10px; padding:10px;
}
.field-manager.open{display:block;}
.field-manager-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 4px; border-bottom:1px dashed var(--line); font-size:14px;
}
.field-manager-row:last-child{border-bottom:none;}
.field-manager-row button{
  background:none; border:none; color:var(--danger); font-size:12px; cursor:pointer; padding:4px 6px;
}
.field-manager-empty{font-size:12px; color:var(--ink-soft); padding:6px 4px;}
.field-manager-add{display:flex; gap:8px; margin-top:8px;}
.field-manager-add input{flex:1; padding:9px 10px; border:1.5px solid var(--line); border-radius:8px; background:#fff;}
.field-manager-add .btn{padding:9px 14px; min-height:auto;}
.two-col{display:flex; gap:10px;}
.two-col > .field{flex:1;}
.duration-hint{font-size:12px; color:var(--ink-soft); margin-top:4px;}

.btn{
  border:none; border-radius:10px; padding:12px 16px; font-weight:700; cursor:pointer;
  display:inline-flex; align-items:center; justify-content:center; gap:6px; min-height:48px;
}
.btn-primary{background:var(--primary); color:#fff; width:100%;}
.btn-primary:active{background:var(--primary-dark);}
.btn-primary:disabled{opacity:0.6;}
.btn-outline{background:#fff; color:var(--primary); border:1.5px solid var(--primary);}
.btn-gps{background:var(--sky-soft); color:#274752; width:100%;}
.btn-gps.active{background:var(--sky); color:#fff;}
.btn-gps-toggle{background:var(--sky-soft); color:#274752; width:100%; font-size:16px;}
.btn-gps-toggle.active{
  background:var(--danger); color:#fff;
  animation:pulse-rec 1.6s ease-in-out infinite;
}
@keyframes pulse-rec{
  0%,100%{ box-shadow:0 0 0 0 rgba(180,70,46,0.35); }
  50%{ box-shadow:0 0 0 8px rgba(180,70,46,0); }
}
.work-status{font-size:13px; margin-top:8px; color:var(--ink-soft); font-weight:700;}

.btn-attend-toggle{background:var(--accent-soft); color:#6B4708; width:100%; font-size:16px;}
.btn-attend-toggle.active{
  background:var(--accent); color:#3B2606;
  animation:pulse-attend 1.6s ease-in-out infinite;
}
@keyframes pulse-attend{
  0%,100%{ box-shadow:0 0 0 0 rgba(217,142,43,0.35); }
  50%{ box-shadow:0 0 0 8px rgba(217,142,43,0); }
}
.btn-break-toggle{background:var(--soil-soft); color:#4A2F17; width:100%; font-size:15px; margin-top:8px;}
.btn-break-toggle.active{
  background:var(--soil); color:#fff;
  animation:pulse-break 1.6s ease-in-out infinite;
}
@keyframes pulse-break{
  0%,100%{ box-shadow:0 0 0 0 rgba(122,82,48,0.35); }
  50%{ box-shadow:0 0 0 8px rgba(122,82,48,0); }
}
.attend-row{display:flex; justify-content:space-between; align-items:center; padding:8px 4px; border-bottom:1px dashed var(--line); font-size:13px;}
.attend-row:last-child{border-bottom:none;}
.attend-row .name{font-weight:700;}
.attend-row .badge-working{background:var(--danger-soft); color:var(--danger); font-size:11px; padding:2px 8px; border-radius:20px; font-weight:700;}
.attend-row .badge-break{background:var(--soil-soft); color:#4A2F17; font-size:11px; padding:2px 8px; border-radius:20px; font-weight:700;}
.attend-empty{font-size:12px; color:var(--ink-soft); padding:4px;}
.btn-photo{background:var(--soil-soft); color:#4A2F17; width:100%;}
.btn-photo.has-photo{background:var(--soil); color:#fff;}
.btn-block{width:100%;}
.btn-row{display:flex; gap:10px; margin-top:14px;}
.btn-row .btn{flex:1;}

.gps-result, .photo-result{font-size:12px; margin-top:8px; color:var(--ink-soft);}
.gps-result a{color:var(--sky); font-weight:700; text-decoration:none;}
.photo-thumb{margin-top:8px; max-width:120px; border-radius:8px; display:block; border:1px solid var(--line);}

/* Furrow timeline */
.timeline{position:relative; padding-left:26px;}
.timeline::before{
  content:"";
  position:absolute; left:9px; top:6px; bottom:6px; width:2px;
  background-image:repeating-linear-gradient(to bottom, var(--soil) 0, var(--soil) 6px, transparent 6px, transparent 12px);
}
.entry{position:relative; margin-bottom:14px;}
.entry::before{
  content:"";
  position:absolute; left:-26px; top:14px;
  width:12px; height:12px; border-radius:50%;
  background:var(--accent); border:2px solid #fff; box-shadow:0 0 0 2px var(--soil);
}
.entry-card{background:var(--surface); border:1px solid var(--line); border-radius:12px; padding:12px 14px;}
.entry-top{display:flex; justify-content:space-between; align-items:baseline; gap:8px;}
.entry-time{font-family:'Roboto Mono',monospace; font-weight:700; color:var(--primary-dark); font-size:14px;}
.entry-dur{font-size:12px; color:var(--ink-soft);}
.entry-task{font-weight:700; margin:4px 0 2px; font-size:15px;}
.entry-field{font-size:13px; color:var(--ink-soft); margin-bottom:2px;}
.entry-worker{font-size:12px; color:var(--soil); margin-bottom:6px; font-weight:700;}
.entry-note{font-size:13px; color:var(--ink-soft); margin-bottom:6px; white-space:pre-wrap;}
.entry-meta{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
.badge{font-size:11px; padding:3px 8px; border-radius:20px; font-weight:700; display:inline-flex; align-items:center; gap:4px;}
.badge-gps{background:var(--sky-soft); color:#1B4451;}
.badge-photo{background:var(--soil-soft); color:#4A2F17;}
.badge-pending{background:var(--accent-soft); color:#6B4708;}
.badge-progress{background:var(--danger-soft); color:var(--danger);}
.entry-actions button.edit{color:var(--sky);}
.entry-thumb{width:56px; height:56px; border-radius:8px; object-fit:cover; border:1px solid var(--line);}
.entry-actions{display:flex; gap:8px; margin-top:8px;}
.entry-actions button{background:none; border:none; font-size:12px; color:var(--ink-soft); cursor:pointer; padding:4px 6px; text-decoration:underline;}
.entry-actions button.del{color:var(--danger);}

.empty{text-align:center; padding:30px 10px; color:var(--ink-soft);}
.empty .icon{font-size:34px; margin-bottom:8px;}

/* Report */
.date-picker-row{display:flex; align-items:center; gap:10px; margin-bottom:14px;}
.date-picker-row input{flex:1;}
.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;}
.stat-box{background:var(--primary); color:#fff; border-radius:12px; padding:14px;}
.stat-box .label{font-size:11px; opacity:0.85;}
.stat-box .value{font-family:'Zen Kaku Gothic New',sans-serif; font-weight:900; font-size:22px; margin-top:2px;}
.stat-box.alt{background:var(--accent); color:#3B2606;}
.breakdown-row{display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed var(--line); font-size:14px;}
.breakdown-row:last-child{border-bottom:none;}
.report-actions{display:flex; gap:10px; margin:14px 0;}
.sheet-export-status{font-size:12px; color:var(--ink-soft); margin-top:8px; text-align:center;}

/* History */
.history-item{display:flex; justify-content:space-between; align-items:center; padding:14px; border:1px solid var(--line); border-radius:12px; margin-bottom:10px; background:#fff; cursor:pointer;}
.history-item:active{background:var(--bg);}
.history-date{font-weight:700; font-size:15px;}
.history-sub{font-size:12px; color:var(--ink-soft); margin-top:2px;}
.history-arrow{color:var(--soil); font-size:18px;}

/* Tab bar */
.tabbar{
  position:fixed; left:0; right:0; bottom:0;
  background:#fff; border-top:1px solid var(--line);
  display:flex; padding-bottom:var(--safe-bottom);
  z-index:20;
}
.tabbar button{
  flex:1; background:none; border:none; padding:10px 4px 8px; cursor:pointer;
  color:var(--ink-soft); display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11px; font-weight:700;
}
.tabbar button .ic{font-size:20px;}
.tabbar button.active{color:var(--primary);}

.toast{
  position:fixed; bottom:calc(90px + var(--safe-bottom)); left:50%; transform:translateX(-50%);
  background:var(--primary-dark); color:#fff; padding:10px 18px; border-radius:30px; font-size:13px;
  opacity:0; pointer-events:none; transition:opacity 0.25s; z-index:30; white-space:nowrap;
}
.toast.show{opacity:1;}

.print-area{display:none;}
@media print{
  body *{visibility:hidden;}
  .print-area, .print-area *{visibility:visible;}
  .print-area{position:absolute; left:0; top:0; width:100%; display:block; padding:20px;}
  .print-title{font-size:20px; font-weight:900; margin-bottom:4px;}
  .print-sub{font-size:12px; color:#555; margin-bottom:16px;}
  .print-stats{display:flex; gap:20px; margin-bottom:16px; font-size:13px;}
  .print-entry{border-bottom:1px solid #ccc; padding:8px 0; font-size:13px;}
  .print-entry b{font-size:14px;}
}
</style>
</head>
<body>

<div id="setupScreen">
  <div class="setup-card">
    <div class="sp-icon">🌱</div>
    <h1>畑ノートへようこそ</h1>
    <p class="sp-desc">家族・従業員のみなさんと記録を自動で共有するために、最初に設定してください。</p>
    <div class="field">
      <label>農場コード（全員で同じものを使います）</label>
      <input type="text" id="setupFarmCode" placeholder="例）yamada-farm-2026">
      <div class="hint">初めての場合は自由に決めてください。他の家族・従業員の端末にも同じコードを入力してもらうと、記録が自動的にひとつにまとまります。</div>
    </div>
    <div class="field">
      <label>あなたのアカウント</label>
      <div class="google-status" id="googleAccountStatus">未ログイン</div>
      <button class="btn btn-outline btn-block" id="googleLoginBtn" type="button">Googleでログイン</button>
    </div>
    <button class="btn btn-primary" id="setupSaveBtn" disabled>保存して始める</button>
    <div class="setup-status" id="setupStatus"></div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-row">
    <div>
      <p class="farm-name" id="farmNameDisp">農場名未設定</p>
      <p class="today-date" id="todayDateDisp">-</p>
      <p class="today-sub" id="todayCountDisp">本日の記録 0件</p>
      <p class="sync-badge"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">同期中...</span></p>
    </div>
    <button class="settings-btn" id="settingsToggle" aria-label="設定">⚙</button>
  </div>
  <div class="settings-panel" id="settingsPanel">
    <label>農場名（表示用・全員に共通）</label>
    <input type="text" id="farmNameInput" placeholder="例）〇〇農園">
    <label>あなたのアカウント</label>
    <div class="google-status" id="settingsGoogleStatus">未ログイン</div>
    <label>表示名（作業記録に表示されます）</label>
    <input type="text" id="workerNameInput" placeholder="例）山田太郎">
    <label>農場コード</label>
    <input type="text" id="farmCodeInput" placeholder="農場コード">
    <div class="hint" style="opacity:0.75; font-size:11px; margin-top:2px;">コードを変えると別の農場データに切り替わります（新しい端末を仲間に追加する時は、同じコードを入力してもらってください）。</div>
    <label>Google スプレッドシートID（日報の転記先・全員に共通）</label>
    <input type="text" id="sheetIdInput" placeholder="スプレッドシートのURLの/d/と/editの間の文字列">
    <label>作業記録：シート名・開始セル</label>
    <input type="text" id="sheetRangeInput" placeholder="例）Sheet1!A1">
    <label>出退勤：シート名・開始セル</label>
    <input type="text" id="attendSheetRangeInput" placeholder="例）出退勤!A1">
    <div class="row-btns">
      <button class="save" id="saveSettingsBtn">保存</button>
      <button class="reset" id="logoutBtn">ログアウト</button>
    </div>
  </div>
</div>

<main>

  <!-- 入力タブ -->
  <section class="tab active" id="tab-input">
    <div class="card">
      <h2>🕐 出退勤</h2>
      <button class="btn btn-attend-toggle" id="attendToggleBtn" type="button">🕐 出勤する</button>
      <div class="work-status" id="attendStatusDisplay"></div>
      <button class="btn btn-break-toggle" id="breakToggleBtn" type="button" style="display:none;">☕ 休憩する</button>
      <div id="attendanceList" style="margin-top:10px;"></div>
    </div>

    <div class="card">
      <h2>📝 作業を記録</h2>
      <div class="field">
        <label>作業日</label>
        <input type="date" id="inpDate">
      </div>
      <div class="field">
        <label>圃場</label>
        <select id="inpField">
          <option value="">選択してください</option>
        </select>
        <button type="button" class="link-btn" id="manageFieldsBtn">＋ 圃場を管理する</button>
        <div class="field-manager" id="fieldManager">
          <div id="fieldManagerList"></div>
          <div class="field-manager-add">
            <input type="text" id="newFieldInput" placeholder="例）北畑・トマト">
            <button type="button" class="btn btn-outline" id="addFieldBtn">追加</button>
          </div>
        </div>
      </div>
      <div class="field">
        <label>作物・品種（任意）</label>
        <input type="text" id="inpCrop" placeholder="例）ミニトマト（桃太郎）">
      </div>
      <div class="field">
        <label>作業内容</label>
        <select id="inpTaskType">
          <option value="耕起・整地">耕起・整地</option>
          <option value="播種・育苗">播種・育苗</option>
          <option value="定植">定植</option>
          <option value="施肥">施肥</option>
          <option value="防除（農薬散布）">防除（農薬散布）</option>
          <option value="除草">除草</option>
          <option value="灌水">灌水</option>
          <option value="収穫">収穫</option>
          <option value="選別・調製">選別・調製</option>
          <option value="出荷・配送">出荷・配送</option>
          <option value="剪定・誘引">剪定・誘引</option>
          <option value="資材管理・点検">資材管理・点検</option>
          <option value="その他（自由入力）">その他（自由入力）</option>
        </select>
        <input type="text" id="inpTaskOther" placeholder="作業内容を入力" style="margin-top:8px; display:none;">
      </div>

      <div class="field" id="liveTimeSection">
        <label>作業時間（GPSで自動記録）</label>
        <button class="btn btn-gps-toggle" id="gpsToggleBtn" type="button">📍 GPSで作業開始</button>
        <div class="work-status" id="workStatusDisplay"></div>
      </div>

      <div class="field" id="manualTimeSection" style="display:none;">
        <label>作業時間（過去日の手動記録）</label>
        <div class="two-col">
          <div class="field">
            <label>開始時刻</label>
            <input type="time" id="inpStart">

function minutesToHM(mins){

function calcDuration(start, end){

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  let total = (eh*60+em) - (sh*60+sm);
  if(total < 0) total += 24*60;
  return total;
}

/* ---------- image compression ---------- */
function compressImage(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const maxW = 640;
        const scale = Math.min(1, maxW/img.width);
        const canvas = document.createElement('canvas');
        canvas.width = img.width*scale;
        canvas.height = img.height*scale;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        let quality = 0.55;
        let out = canvas.toDataURL('image/jpeg', quality);
        while(out.length > 650000 && quality > 0.2){
          quality -= 0.1;
          out = canvas.toDataURL('image/jpeg', quality);
        }
        resolve(out);
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function entryHtml(e, opts={}){
  const showActions = opts.showActions !== false;
  const icon = TASK_ICONS[e.taskType] || '📌';
  const inProgress = e.status === 'in_progress';
  const dur = e.durationMin!=null ? `<span class="entry-dur">（${minutesToHM(e.durationMin)}）</span>` : '';
  const gpsObj = e.gpsEnd || e.gpsStart || e.gps || null;
  const gpsBadge = gpsObj ? `<a class="badge badge-gps" href="${gpsObj.mapUrl}" target="_blank" rel="noopener">📍 位置記録あり</a>` : '';
  const photoBadge = e.photo ? `<span class="badge badge-photo">📷 写真</span>` : '';
  const pendingBadge = e._pending ? `<span class="badge badge-pending">⏳ 送信待ち</span>` : '';
  const progressBadge = inProgress ? `<span class="badge badge-progress">⏱ 作業中</span>` : '';
  const photo = e.photo ? `<img class="entry-thumb" src="${e.photo}">` : '';
  const actions = showActions ? `
      <div class="entry-actions">
        <button class="edit" data-edit="${e.id}" data-start="${e.start||''}" data-end="${e.end||''}">時刻を修正</button>
        <button class="edit" data-note-edit="${e.id}" data-note="${escapeHtml(e.note||'')}">メモを編集</button>
        <button class="del" data-del="${e.id}">削除</button>
      </div>` : '';
  return `
  <div class="entry">
    <div class="entry-card">
      <div class="entry-top">
        <span class="entry-time num">${e.start||'--:--'} 〜 ${inProgress ? '…' : (e.end||'--:--')}</span>
        ${dur}
      </div>
      <div class="entry-task">${icon} ${escapeHtml(e.taskType)}</div>
      ${e.field ? `<div class="entry-field">🏞 ${escapeHtml(e.field)}${e.crop ? ' ／ ' + escapeHtml(e.crop) : ''}</div>` : ''}
      ${e.workerName ? `<div class="entry-worker">👤 ${escapeHtml(e.workerName)}</div>` : ''}
      ${e.note ? `<div class="entry-note">${escapeHtml(e.note)}</div>` : ''}
      <div class="entry-meta">${progressBadge}${gpsBadge}${photoBadge}${pendingBadge}${photo}</div>
      ${actions}
    </div>
  </div>`;
}

async function editEntryTime(entryId, currentStart, currentEnd){
  const newStart = prompt('開始時刻を修正してください（例 09:30）', currentStart || '');
  if(newStart === null) return;
  const newEnd = prompt('終了時刻を修正してください（例 10:15／作業中なら空欄のまま）', currentEnd || '');
  if(newEnd === null) return;
  const updates = { start: newStart.trim() };
  if(newEnd.trim()){
    updates.end = newEnd.trim();
    updates.durationMin = calcDuration(updates.start, updates.end);
    updates.status = 'done';
  }
  try{
    await updateDoc(doc(entriesCol(), entryId), updates);
    showToast('時刻を修正しました');
  }catch(e){
    console.error(e);
    showToast('修正に失敗しました');
  }
}

/* ---------- GPS start/stop workflow (live, today only) ---------- */
function getCurrentGpsAsync(){
  return new Promise((resolve)=>{
    if(!navigator.geolocation){ resolve(null); return; }
    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        const lat = pos.coords.latitude.toFixed(5);
        const lon = pos.coords.longitude.toFixed(5);
        const acc = Math.round(pos.coords.accuracy);
        resolve({ lat, lon, accuracy: acc, mapUrl: `https://www.google.com/maps?q=${lat},${lon}` });
      },
      ()=> resolve(null),
      { enableHighAccuracy:true, timeout:10000 }
    );
  });
}

    start: startHM, end: null, durationMin: null,
    status: 'in_progress',
    gpsStart: null, gpsEnd: null,
    photo: currentPhoto,
    workerName,
    startAt: now.getTime(),
    createdAt: now.getTime()
  };
  try{
    const ref = await addDoc(entriesCol(), entry);
    activeEntryId = ref.id;
    activeEntryStartAt = now.getTime();

/* ---------- attendance (clock-in / clock-out) ---------- */
function attendanceRowHtml(r){
  const working = r.status === 'in';
  const range = working ? `${r.clockIn||'--:--'} 〜` : `${r.clockIn||'--:--'} 〜 ${r.clockOut||'--:--'}`;
  const totalBreakMin = r.totalBreakMin || 0;
  const durText = (!working && r.clockInAt && r.clockOutAt)
    ? (()=>{
        const grossMin = Math.round((r.clockOutAt - r.clockInAt)/60000);
        const netMin = Math.max(0, grossMin - totalBreakMin);
        return totalBreakMin > 0
          ? `（勤務${minutesToHM(netMin)}／休憩${minutesToHM(totalBreakMin)}）`
          : `（${minutesToHM(grossMin)}）`;
      })()
    : (totalBreakMin > 0 ? `（休憩計${minutesToHM(totalBreakMin)}）` : '');
  const badge = working ? (r.onBreak ? `<span class="badge-break">☕ 休憩中</span>` : `<span class="badge-working">勤務中</span>`) : '';
  return `<div class="attend-row"><span class="name">👤 ${escapeHtml(r.workerName||'')}</span><span class="num">${range}${durText} ${badge}</span></div>`;
}

}

async function clockIn(){

    clockOut: null, clockOutAt: null,
    gpsIn: null, gpsOut: null,

async function clockOut(){

  const btn = document.getElementById('attendToggleBtn');
  btn.disabled = true;
  if(onBreak) await endBreak(); // don't leave a break dangling
  const now = new Date();

    getCurrentGpsAsync().then(gps=>{

async function startBreak(){

  const btn = document.getElementById('breakToggleBtn');

      onBreak: true, breakStart: breakStartHM, breakStartAt: breakStartAt
    });

  }catch(e){
    console.error(e);
    showToast('休憩の記録に失敗しました');

  }

async function endBreak(){
  if(!activeAttendanceId || !breakStartAt) return;
  const btn = document.getElementById('breakToggleBtn');
  btn.disabled = true;
  const now = new Date();
  const hm = pad(now.getHours())+':'+pad(now.getMinutes());
  const durationMin = Math.max(0, Math.round((now.getTime() - breakStartAt)/60000));
  try{
    await updateDoc(doc(attendanceCol(), activeAttendanceId), {
      onBreak: false, breakStart: null, breakStartAt: null,
      totalBreakMin: increment(durationMin),
      breaks: arrayUnion({start: breakStartHM, end: hm, durationMin})
    });
    onBreak = false;
    breakStartAt = null; breakStartHM = null;
    exitBreakUI();
    showToast(`休憩を終了しました（${minutesToHM(durationMin)}）`);
  }catch(e){
    console.error(e);
    showToast('休憩終了の記録に失敗しました');

    btn.disabled = false;
  }
}

function renderReportFromEntries(date, entries){
  const totalMin = entries.reduce((s,e)=> s + (e.durationMin||0), 0);
  document.getElementById('statTotalTime').textContent = minutesToHM(totalMin);
  document.getElementById('statCount').textContent = entries.length + '件';

  const byTask = {};
  entries.forEach(e=>{
    if(!byTask[e.taskType]) byTask[e.taskType] = {count:0, min:0};
    byTask[e.taskType].count++;
    byTask[e.taskType].min += (e.durationMin||0);
  });
  const bl = document.getElementById('breakdownList');
  const taskKeys = Object.keys(byTask);
  if(taskKeys.length===0){
    bl.innerHTML = `<p style="color:var(--ink-soft); font-size:13px;">この日の記録はありません。</p>`;
  } else {
    bl.innerHTML = taskKeys.map(k=>{
      const icon = TASK_ICONS[k] || '📌';
      return `<div class="breakdown-row"><span>${icon} ${escapeHtml(k)}（${byTask[k].count}件）</span><span class="num">${minutesToHM(byTask[k].min)}</span></div>`;
    }).join('');
  }

  const re = document.getElementById('reportEntries');
  re.innerHTML = entries.length===0 ? '' : `<div class="timeline">${entries.map(e=>entryHtml(e,{showActions:false})).join('')}</div>`;

  window._reportCache = { date, entries, totalMin, byTask };
}

function buildReportText(){
  const c = window._reportCache;
  if(!c) return '';
  const farmName = document.getElementById('farmNameInput').value || document.getElementById('farmNameDisp').textContent;
  let txt = `作業日報\n${dispDate(c.date)}\n${farmName}\n\n`;
  txt += `合計作業時間: ${minutesToHM(c.totalMin)}　作業件数: ${c.entries.length}件\n\n`;
  txt += `【内訳】\n`;
  Object.keys(c.byTask).forEach(k=>{
    txt += `・${k}: ${c.byTask[k].count}件 / ${minutesToHM(c.byTask[k].min)}\n`;
  });
  txt += `\n【詳細】\n`;
  c.entries.forEach(e=>{
    txt += `${e.start||'--:--'}〜${e.end||'--:--'} ${e.taskType}`;
    if(e.field) txt += `（${e.field}${e.crop ? '・'+e.crop : ''}）`;
    if(e.durationMin!=null) txt += ` [${minutesToHM(e.durationMin)}]`;
    if(e.workerName) txt += ` - ${e.workerName}`;
    txt += `\n`;
    if(e.note) txt += `  メモ: ${e.note}\n`;
    if(e.gps) txt += `  位置: ${e.gps.lat}, ${e.gps.lon}\n`;
  });
  return txt;
}

function preparePrint(){
  const c = window._reportCache;
  if(!c) return;
  const farmName = document.getElementById('farmNameInput').value || '';
  let html = `<div class="print-title">作業日報</div>`;
  html += `<div class="print-sub">${dispDate(c.date)}　${escapeHtml(farmName)}</div>`;
  html += `<div class="print-stats"><span>合計作業時間: ${minutesToHM(c.totalMin)}</span><span>作業件数: ${c.entries.length}件</span></div>`;
  c.entries.forEach(e=>{
    html += `<div class="print-entry"><b>${e.start||'--:--'}〜${e.end||'--:--'} ${escapeHtml(e.taskType)}</b>`;
    if(e.field) html += ` — ${escapeHtml(e.field)}${e.crop ? '・'+escapeHtml(e.crop) : ''}`;
    if(e.durationMin!=null) html += ` (${minutesToHM(e.durationMin)})`;

/* ---------- Google Sheets export ---------- */
async function ensureSheetsToken(){
  if(sheetsAccessToken) return sheetsAccessToken;
  const result = await signInWithPopup(auth, googleProvider);
  const cred = GoogleAuthProvider.credentialFromResult(result);
  sheetsAccessToken = cred && cred.accessToken ? cred.accessToken : null;
  return sheetsAccessToken;
}

function buildSheetRows(c){
  return c.entries.map(e=>[
    c.date,
    e.start || '',
    e.status === 'in_progress' ? '(作業中)' : (e.end || ''),
    e.durationMin != null ? minutesToHM(e.durationMin) : '',
    e.workerName || '',
    e.field || '',
    e.crop || '',
    e.taskType || '',
    e.note || '',
    (e.gpsStart && e.gpsStart.mapUrl) || '',
    (e.gpsEnd && e.gpsEnd.mapUrl) || ''
  ]);
}

async function exportToSheet(){
  const status = document.getElementById('sheetExportStatus');
  const c = window._reportCache;
  if(!c || c.entries.length===0){
    status.textContent = 'この日の記録がありません。';
    return;
  }
  if(!currentSheetId){
    status.textContent = '⚙設定からスプレッドシートIDを登録してください。';
    return;
  }
  const btn = document.getElementById('sheetExportBtn');
  btn.disabled = true;
  status.textContent = '転記中...';
  try{
    const token = await ensureSheetsToken();
    if(!token) throw new Error('no-token');
    const rows = buildSheetRows(c);
    const range = encodeURIComponent(currentSheetRange || 'Sheet1!A1');
    const res = await fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: rows })
      }
    );
    if(res.status === 401){
      // token expired — get a fresh one and retry once
      sheetsAccessToken = null;
      const freshToken = await ensureSheetsToken();
      const retryRes = await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
        {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${freshToken}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ values: rows })
        }
      );
      if(!retryRes.ok) throw new Error('sheets-api-error-' + retryRes.status);
    } else if(!res.ok){
      throw new Error('sheets-api-error-' + res.status);
    }
    status.textContent = `✅ ${rows.length}件を転記しました（${dispDate(c.date)}）`;
    showToast('スプレッドシートに転記しました');
  }catch(e){
    console.error(e);
    if(String(e.message).includes('403')){
      status.textContent = '権限がありません。スプレッドシートIDと、ご自身のGoogleアカウントに編集権限があるか確認してください。';
    } else if(String(e.message).includes('404')){
      status.textContent = 'スプレッドシートが見つかりません。IDをご確認ください。';
    } else {
      status.textContent = '転記に失敗しました。もう一度お試しください。';
    }
  }finally{
    btn.disabled = false;
  }
}

function buildAttendanceSheetRows(c){
  return c.records.map(r=>{
    const totalBreakMin = r.totalBreakMin || 0;
    const grossMin = (r.clockInAt && r.clockOutAt) ? Math.round((r.clockOutAt - r.clockInAt)/60000) : null;
    const netMin = grossMin != null ? Math.max(0, grossMin - totalBreakMin) : null;
    return [
      c.date,
      r.workerName || '',
      r.clockIn || '',
      r.status === 'in' ? '(勤務中)' : (r.clockOut || ''),
      netMin != null ? minutesToHM(netMin) : '',
      totalBreakMin > 0 ? minutesToHM(totalBreakMin) : '',
      (r.gpsIn && r.gpsIn.mapUrl) || '',
      (r.gpsOut && r.gpsOut.mapUrl) || ''
    ];
  });
}

async function exportAttendanceToSheet(){
  const status = document.getElementById('attendSheetExportStatus');
  const c = window._reportAttendanceCache;
  if(!c || c.records.length===0){
    status.textContent = 'この日の出退勤記録がありません。';
    return;
  }
  if(!currentSheetId){
    status.textContent = '⚙設定からスプレッドシートIDを登録してください。';
    return;
  }
  const btn = document.getElementById('attendSheetExportBtn');
  btn.disabled = true;
  status.textContent = '転記中...';
  try{
    const token = await ensureSheetsToken();
    if(!token) throw new Error('no-token');
    const rows = buildAttendanceSheetRows(c);
    const range = encodeURIComponent(currentAttendSheetRange || '出退勤!A1');
    const doAppend = (tok)=> fetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${currentSheetId}/values/${range}:append?valueInputOption=USER_ENTERED&insertDataOption=INSERT_ROWS`,
      {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${tok}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ values: rows })
      }
    );
    let res = await doAppend(token);
    if(res.status === 401){
      sheetsAccessToken = null;
      const freshToken = await ensureSheetsToken();
      res = await doAppend(freshToken);
    }
    if(!res.ok) throw new Error('sheets-api-error-' + res.status);
    status.textContent = `✅ ${rows.length}件を転記しました（${dispDate(c.date)}）`;
    showToast('出退勤をスプレッドシートに転記しました');
  }catch(e){
    console.error(e);
    if(String(e.message).includes('403')){
      status.textContent = '権限がありません。スプレッドシートIDと編集権限をご確認ください。';
    } else if(String(e.message).includes('404')){
      status.textContent = 'スプレッドシートまたはシート名が見つかりません。';
    } else if(String(e.message).includes('400')){
      status.textContent = 'シート名が正しいかご確認ください（実際のタブ名と一致させてください）。';
    } else {
      status.textContent = '転記に失敗しました。もう一度お試しください。';
    }
  }finally{
    btn.disabled = false;
  }
}

/* ---------- History ---------- */
async function renderHistoryTab(){
  const el = document.getElementById('historyList');
  el.innerHTML = `<div class="empty">読み込み中...</div>`;
  try{
    const q = query(entriesCol(), orderBy('date','desc'), limit(2000));
    const snap = await getDocs(q);
    const byDate = {};
    snap.docs.forEach(d=>{
      const e = d.data();
      if(!byDate[e.date]) byDate[e.date] = {count:0, totalMin:0};
      byDate[e.date].count++;
      byDate[e.date].totalMin += (e.durationMin||0);
    });
    const dates = Object.keys(byDate).sort().reverse();
    if(dates.length===0){
      el.innerHTML = `<div class="empty"><div class="icon">📭</div>まだ記録がありません。</div>`;
      return;
    }
    el.innerHTML = dates.map(d=>`
      <div class="history-item" data-date="${d}">
        <div>
          <div class="history-date">${dispDate(d)}</div>
          <div class="history-sub">${byDate[d].count}件の記録 ／ 合計 ${minutesToHM(byDate[d].totalMin)}</div>
        </div>
        <div class="history-arrow">›</div>
      </div>`).join('');
    el.querySelectorAll('.history-item').forEach(item=>{
      item.addEventListener('click', ()=>{
        document.getElementById('reportDate').value = item.dataset.date;
        switchTab('report');
      });
    });
  }catch(e){
    console.error(e);
    el.innerHTML = `<div class="empty">履歴の取得に失敗しました。電波の良い場所でもう一度お試しください。</div>`;
  }
}

/* ---------- tab switching ---------- */
function switchTab(name){
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===name));
  if(name==='report') subscribeReport();
  if(name==='history') renderHistoryTab();
}

function updateDurationHint(){
  const start = document.getElementById('inpStart').value;
  const end = document.getElementById('inpEnd').value;
  const dur = calcDuration(start, end);
  document.getElementById('durationHint').textContent = dur!=null ? `作業時間: ${minutesToHM(dur)}` : '';
}

/* ---------- events (bound once) ---------- */
let eventsBound = false;
function bindTabEvents(){
  if(eventsBound) return;
  eventsBound = true;

  document.querySelectorAll('.tabbar button').forEach(b=>{
    b.addEventListener('click', ()=> switchTab(b.dataset.tab));
  });

  document.getElementById('settingsToggle').addEventListener('click', ()=>{
    document.getElementById('settingsPanel').classList.toggle('open');
  });
  document.getElementById('saveSettingsBtn').addEventListener('click', async ()=>{
    const newFarmName = document.getElementById('farmNameInput').value.trim();
    const newWorkerName = document.getElementById('workerNameInput').value.trim();
    const newFarmCode = document.getElementById('farmCodeInput').value.trim();
    let newSheetId = document.getElementById('sheetIdInput').value.trim();
    const newSheetRange = document.getElementById('sheetRangeInput').value.trim() || 'Sheet1!A1';
    const newAttendSheetRange = document.getElementById('attendSheetRangeInput').value.trim() || '出退勤!A1';
    const urlMatch = newSheetId.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
    if(urlMatch) newSheetId = urlMatch[1];
    if(!newWorkerName || !newFarmCode){
      showToast('表示名と農場コードを入力してください');
      return;
    }
    const codeChanged = newFarmCode !== farmCode;
    workerName = newWorkerName;
    farmCode = newFarmCode;
    const defaultName = currentUser ? (currentUser.displayName || currentUser.email || '') : '';
    saveDeviceConfig({farmCode, workerNameOverride: newWorkerName !== defaultName ? newWorkerName : ''});
    await saveFarmName(newFarmName);
    await saveSheetSettings(newSheetId, newSheetRange, newAttendSheetRange);
    document.getElementById('sheetIdInput').value = newSheetId;
    document.getElementById('settingsPanel').classList.remove('open');
    showToast('設定を保存しました');
    if(codeChanged){
      subscribeFields();
      subscribeSettings();
      subscribeToday();
      if(currentTab==='report') subscribeReport();
      if(currentTab==='history') renderHistoryTab();
    }
  });
  document.getElementById('logoutBtn').addEventListener('click', async ()=>{
    if(!confirm('ログアウトします。この端末の農場コードの設定もリセットされます。よろしいですか？')) return;
    try{ await signOut(auth); }catch(e){ console.error(e); }
    localStorage.removeItem('hatanote-device-config');
    location.reload();
  });
  document.getElementById('googleLoginBtn').addEventListener('click', async ()=>{
    const status = document.getElementById('setupStatus');
    status.textContent = 'ログイン中...';
    try{
      const result = await signInWithPopup(auth, googleProvider);
      const cred = GoogleAuthProvider.credentialFromResult(result);
      if(cred && cred.accessToken) sheetsAccessToken = cred.accessToken;
      status.textContent = '';
    }catch(e){
      console.error(e);
      if(e.code === 'auth/popup-blocked'){
        status.textContent = 'ポップアップがブロックされました。ブラウザの設定でこのサイトのポップアップを許可してください。';
      } else if(e.code === 'auth/popup-closed-by-user'){
        status.textContent = '';
      } else if(e.code === 'auth/unauthorized-domain'){
        status.textContent = 'このサイトのドメインがFirebaseで承認されていません（承認済みドメインの設定をご確認ください）。';
      } else {
        status.textContent = 'ログインに失敗しました。もう一度お試しください。';
      }
    }
  });
  document.getElementById('setupFarmCode').addEventListener('input', updateAuthUI);

  document.getElementById('inpDate').addEventListener('change', ()=>{
    updateFormModeForDate();
    subscribeToday();
  });
  document.getElementById('inpStart').addEventListener('change', updateDurationHint);
  document.getElementById('inpEnd').addEventListener('change', updateDurationHint);

  document.getElementById('inpTaskType').addEventListener('change', (e)=>{
    document.getElementById('inpTaskOther').style.display = e.target.value==='その他（自由入力）' ? 'block' : 'none';
  });

  document.getElementById('gpsToggleBtn').addEventListener('click', toggleGpsWork);
  document.getElementById('attendToggleBtn').addEventListener('click', toggleAttendance);
  document.getElementById('breakToggleBtn').addEventListener('click', toggleBreak);

  document.getElementById('manageFieldsBtn').addEventListener('click', ()=>{
    document.getElementById('fieldManager').classList.toggle('open');
  });
  document.getElementById('addFieldBtn').addEventListener('click', async ()=>{
    const input = document.getElementById('newFieldInput');
    const name = input.value.trim();
    if(!name){ input.focus(); return; }
    await addField(name);
    input.value = '';
    document.getElementById('inpField').value = name;
    showToast('圃場を追加しました');
  });
  document.getElementById('newFieldInput').addEventListener('keydown', (e)=>{
    if(e.key === 'Enter'){ e.preventDefault(); document.getElementById('addFieldBtn').click(); }
  });

  document.getElementById('photoBtn').addEventListener('click', ()=>{
    document.getElementById('photoInput').click();
  });
  document.getElementById('photoInput').addEventListener('change', (e)=>{
    handlePhoto(e.target.files[0]);
  });

  document.getElementById('saveEntryBtn').addEventListener('click', saveManualEntry);

  document.getElementById('reportDate').addEventListener('change', subscribeReport);
  document.getElementById('printBtn').addEventListener('click', preparePrint);
  document.getElementById('sheetExportBtn').addEventListener('click', exportToSheet);
  document.getElementById('attendSheetExportBtn').addEventListener('click', exportAttendanceToSheet);
  document.getElementById('copyBtn').addEventListener('click', async ()=>{
    const txt = buildReportText();
    try{
      await navigator.clipboard.writeText(txt);
      showToast('テキストをコピーしました');
    }catch(e){
      showToast('コピーできませんでした');
    }
  });

  document.getElementById('setupSaveBtn').addEventListener('click', handleSetupSave);

  window.addEventListener('online', setSyncStatus);
  window.addEventListener('offline', setSyncStatus);
}

/* ---------- entry point ---------- */
(async function main(){
  bindTabEvents();
  initFirebase();

  onAuthStateChanged(auth, async (user)=>{
    currentUser = user;
    updateAuthUI();

    if(appStarted) return;

    if(user){
      const cfg = loadDeviceConfig();
      if(cfg && cfg.farmCode){
        farmCode = cfg.farmCode;
        workerName = cfg.workerNameOverride || user.displayName || user.email || '匿名';
        document.getElementById('workerNameInput').value = workerName;
        document.getElementById('farmCodeInput').value = farmCode;
        hideSetupScreen();
        appStarted = true;
        await startApp();
      } else {
        showSetupScreen(cfg ? cfg.farmCode : '');
      }
    } else {
      showSetupScreen();
    }
  });
})();
</script>

if('serviceWorker' in navigator){

    navigator.serviceWorker.register('service-worker.js').catch(()=>{});
  });
}
